name: Build Android APK & Release

on:
  push:
    tags:
      - 'v*' # Triggers when pushing tags like v1.0.0

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a Release and upload assets

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: taskify-client/package-lock.json

      - name: Install dependencies
        run: |
          cd taskify-client
          npm install

      # --- Inject Env variables here ---
      - name: Create Env File
        run: |
          cat << EOF > taskify-client/.env
          EXPO_PUBLIC_API_HOST=${{ secrets.EXPO_PUBLIC_API_HOST }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID=${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
          R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }}
          R2_BUCKET_NAME=${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL=${{ secrets.R2_PUBLIC_URL }}
          IMAGE_PREFIX=${{ secrets.IMAGE_PREFIX }}
          R2_TOKEN=${{ secrets.R2_TOKEN }}
          AUTOSEND_API_KEY=${{ secrets.AUTOSEND_API_KEY }}
          EOF

      - name: Prebuild Expo App
        run: |
          cd taskify-client
          npx expo prebuild --platform android

      - name: Build Release APK
        run: |
          cd taskify-client/android
          ./gradlew assembleRelease

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: taskify-client/android/app/build/outputs/apk/release/app-release.apk
          name: Release ${{ github.ref_name }}
          body: |
            ## Taskify Release ${{ github.ref_name }}
            
            Compiled APK asset attached below.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
