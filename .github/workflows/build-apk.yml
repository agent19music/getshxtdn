name: Build Android APK & Release

on:
  push:
    tags:
      - 'v*' # Triggers when pushing tags like v1.0.0

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a Release and upload assets

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: taskify-client/package-lock.json

      - name: Install dependencies
        run: |
          cd taskify-client
          npm install

      # --- Inject Env variables here ---
      - name: Create Env File
        run: |
          cat << EOF > taskify-client/.env
          EXPO_PUBLIC_API_HOST=${{ secrets.EXPO_PUBLIC_API_HOST }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID=${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
          R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }}
          R2_BUCKET_NAME=${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL=${{ secrets.R2_PUBLIC_URL }}
          IMAGE_PREFIX=${{ secrets.IMAGE_PREFIX }}
          R2_TOKEN=${{ secrets.R2_TOKEN }}
          AUTOSEND_API_KEY=${{ secrets.AUTOSEND_API_KEY }}
          EOF

      - name: Prebuild Expo App
        run: |
          cd taskify-client
          npx expo prebuild --platform android

      - name: Build Release APK
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError"
        run: |
          cd taskify-client/android
          ./gradlew assembleRelease -x lintVitalAnalyzeRelease -x lintVitalReportRelease --no-daemon

      - name: Find and rename APK
        run: |
          APK_PATH=$(find taskify-client/android -name "*.apk" -path "*/release/*" | head -1)
          echo "Found APK at: $APK_PATH"
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found!"
            find taskify-client/android -name "*.apk" || true
            exit 1
          fi
          cp "$APK_PATH" taskify-client/gsd-${{ github.ref_name }}.apk
          echo "APK_FILE=taskify-client/gsd-${{ github.ref_name }}.apk" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_FILE }}
          name: GSD ${{ github.ref_name }}
          body: |
            ## GSD (Get Shit Done) — ${{ github.ref_name }}

            ### Download
            Grab the APK below and install it on your Android device.

            ### What's New
            - Initial release
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
